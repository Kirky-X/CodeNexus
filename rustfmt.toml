# Rust formatting configuration for CodeNexus.
# Standard style aligned with the Rust style guide.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
fn_args_layout = "Tall"
brace_style = "SameLineWhere"
imports_granularity = "Preserve"
group_imports = "Preserve"
