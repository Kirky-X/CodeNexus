# Release workflow — verifies, builds cross-platform binaries, publishes a
# GitHub Release with binary assets, and publishes to crates.io.
#
# Trigger:  git tag v0.3.1 && git push origin v0.3.1
# Manual:   workflow_dispatch from GitHub Actions UI
#
# Produces:
#   - codenexus-x86_64-unknown-linux-gnu.tar.gz
#   - codenexus-aarch64-apple-darwin.tar.gz
#   - codenexus-x86_64-apple-darwin.tar.gz
#   - codenexus-x86_64-pc-windows-msvc.zip
#   - GitHub Release with auto-generated release notes + binary assets
#   - crates.io publication (codenexus <version>)

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Verify — build + test before any release work
  # --------------------------------------------------------------------------
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config protobuf-compiler

      - name: Verify build (full features)
        run: cargo build --release --features full

      - name: Verify tests pass
        run: cargo test --features full --no-fail-fast

  # --------------------------------------------------------------------------
  # Job 2: Build cross-platform binaries
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --features full

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../codenexus-${{ matrix.target }}.tar.gz codenexus
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/codenexus.exe -DestinationPath codenexus-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codenexus-${{ matrix.target }}
          path: |
            codenexus-${{ matrix.target }}.tar.gz
            codenexus-${{ matrix.target }}.zip
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Job 3: Create GitHub Release with binary assets
  # --------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # Job 4: Publish to crates.io (conditional on token)
  # --------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}

    steps:
      - name: Checkout
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        if: env.HAS_TOKEN == 'true'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install dependencies
        if: env.HAS_TOKEN == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config protobuf-compiler

      - name: Publish to crates.io
        if: env.HAS_TOKEN == 'true'
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publication"
