# Release workflow — builds cross-platform binaries and publishes a GitHub
# Release when a `v*` tag is pushed. Also publishes to crates.io.
#
# Trigger:  git tag v0.1.0 && git push origin v0.1.0
#
# Produces:
#   - codenexus-x86_64-unknown-linux-gnu.tar.gz
#   - codenexus-aarch64-apple-darwin.tar.gz
#   - codenexus-x86_64-apple-darwin.tar.gz
#   - codenexus-x86_64-pc-windows-msvc.zip
#   - crates.io publication (codenexus 0.1.0)

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Build cross-platform binaries
  # --------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} --features full

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../codenexus-${{ matrix.target }}.tar.gz codenexus
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/codenexus.exe -DestinationPath codenexus-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codenexus-${{ matrix.target }}
          path: |
            codenexus-${{ matrix.target }}.tar.gz
            codenexus-${{ matrix.target }}.zip
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # Job 2: Create GitHub Release and upload assets
  # --------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          draft: false
          prerelease: false

  # --------------------------------------------------------------------------
  # Job 3: Publish to crates.io
  # --------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
