name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85 (stable) with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy
      - name: Install nightly toolchain with rustfmt
        # rustfmt.toml uses the nightly-only options `imports_granularity`
        # and `group_imports`, so `cargo fmt` must run on nightly.
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Check formatting
        run: cargo +nightly fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test --verbose
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage (fail under 95% lines)
        run: cargo llvm-cov --all-features --fail-under-lines 95 --lcov --output-path lcov.info
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lcov.info

  security:
    name: cargo-audit + cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-audit (RustSec 漏洞库)
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: cargo-deny (license / ban / advisory)
        uses: EmbarkStudios/cargo-deny-action@v2
