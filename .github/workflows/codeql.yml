# CodeQL — static analysis for Rust
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@4d75a1e6c9bf99b24baf856e3d8df0c75350d4f4 # v3
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@4d75a1e6c9bf99b24baf856e3d8df0c75350d4f4 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4d75a1e6c9bf99b24baf856e3d8df0c75350d4f4 # v3
