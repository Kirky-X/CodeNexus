# Build configuration for CodeNexus.
#
# inklog 0.1.10+ uses gzip (flate2) fallback when the `compression` feature is
# not enabled, so zstd-sys is no longer in the dependency tree. The env vars
# below are retained for future use: if inklog's `compression` feature is ever
# enabled, ZSTD_SYS_USE_PKG_CONFIG=1 makes zstd-sys use pkg-config to find the
# system libzstd instead of compiling from source (avoiding duplicate ZSTD_*
# symbols with lbug's bundled zstd). They are harmless when zstd-sys is absent.
[env]
ZSTD_SYS_USE_PKG_CONFIG = "1"
PKG_CONFIG_PATH = { value = "build-support", relative = true }
# docs.rs sets DOCS_RS=1, which makes lbug's build.rs skip C++ compilation and
# not emit cargo:rustc-env for LBUG_PRECOMPILED_SOURCE/LBUG_PRECOMPILED_LIBRARY_DIR.
# Provide fallback values so lbug's env!() macros resolve at compile time.
# In normal builds, lbug build.rs overrides these via cargo:rustc-env (higher precedence).
LBUG_PRECOMPILED_SOURCE = "/nonexistent"
LBUG_PRECOMPILED_LIBRARY_DIR = "/nonexistent"
